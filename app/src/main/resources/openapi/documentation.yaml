openapi: 3.0.3
info:
  title: Ball Catcher API
  description: REST API for controlling the ball catcher robot's motors and reading sensor data.
  version: 1.0.0

servers:
  - url: http://192.168.1.166:8080
    description: Pi server

paths:
  /api/status:
    get:
      tags: [System]
      summary: Get full system status
      description: Returns combined motor state, feedback, and switch step counts.
      responses:
        "200":
          description: Current system status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatus"

  /api/motor/feedback:
    get:
      tags: [Motor]
      summary: Get motor feedback
      description: Returns current motor sensor readings (angle, steps, velocity, switches).
      responses:
        "200":
          description: Current motor feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MotorFeedback"

  /api/motor/state:
    get:
      tags: [Motor]
      summary: Get motor state
      description: Returns the current motor state machine value.
      responses:
        "200":
          description: Current motor state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MotorState"

  /api/ship/position:
    get:
      tags: [Ship]
      summary: Get head position
      description: Returns the current yaw and pitch of the robot head.
      responses:
        "200":
          description: Current head position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeadPosition"

  /api/motor/move-to-angle:
    post:
      tags: [Motor]
      summary: Move to absolute angle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [degrees]
              properties:
                degrees:
                  type: number
                  format: float
                  example: 180.0
                speed:
                  type: integer
                  description: Max motor speed in steps/sec (50–1000). Defaults to 1000.
                  minimum: 50
                  maximum: 1000
                  example: 500
      responses:
        "200":
          description: Command accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResponse"

  /api/motor/move-to-position:
    post:
      tags: [Motor]
      summary: Move to fractional position
      description: Moves to a position between left switch (0.0) and right switch (1.0).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fraction]
              properties:
                fraction:
                  type: number
                  format: float
                  minimum: 0.0
                  maximum: 1.0
                  example: 0.5
                speed:
                  type: integer
                  description: Max motor speed in steps/sec (50–1000). Defaults to 600.
                  minimum: 50
                  maximum: 1000
                  example: 400
      responses:
        "200":
          description: Command accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResponse"

  /api/motor/move-clockwise:
    post:
      tags: [Motor]
      summary: Move clockwise by degrees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [degrees]
              properties:
                degrees:
                  type: number
                  format: float
                  example: 90.0
                speed:
                  type: integer
                  description: Max motor speed in steps/sec (50–1000). Defaults to 1000.
                  minimum: 50
                  maximum: 1000
                  example: 500
      responses:
        "200":
          description: Command accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResponse"

  /api/motor/move-counter-clockwise:
    post:
      tags: [Motor]
      summary: Move counter-clockwise by degrees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [degrees]
              properties:
                degrees:
                  type: number
                  format: float
                  example: 90.0
                speed:
                  type: integer
                  description: Max motor speed in steps/sec (50–1000). Defaults to 1000.
                  minimum: 50
                  maximum: 1000
                  example: 500
      responses:
        "200":
          description: Command accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResponse"

  /api/motor/calibrate-home:
    post:
      tags: [Motor]
      summary: Calibrate home position
      description: Triggers the homing sequence (moves to both limit switches to determine range).
      responses:
        "200":
          description: Command accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResponse"

  /api/motor/stop:
    post:
      tags: [Motor]
      summary: Emergency stop
      description: Immediately stops the motor.
      responses:
        "200":
          description: Motor stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResponse"

  /api/camera/calibration-capture:
    post:
      tags: [Camera]
      summary: Capture stereo calibration images
      description: Captures chessboard calibration image pairs from both cameras. Automatically saves when both chessboards are detected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [count]
              properties:
                count:
                  type: integer
                  description: Number of image pairs to capture
                  example: 30
                delayMs:
                  type: integer
                  format: int64
                  description: Milliseconds to wait between each capture
                  default: 0
                  example: 2000
      responses:
        "200":
          description: Capture complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResponse"

  /api/camera/raw-capture:
    post:
      tags: [Camera]
      summary: Capture a raw stereo photo pair
      description: Takes one photo from each camera (right and left) and saves them to `raw_photo_logs/<timestamp>/right.png` and `left.png`.
      responses:
        "200":
          description: Photos captured and saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawCaptureResponse"

  /api/camera/scan-cycle:
    post:
      tags: [Camera]
      summary: Start a scan cycle sweep
      description: |
        Continuously sweeps the head across the calibrated range, capturing stereo photos at evenly-spread positions.
        Direction alternates each cycle (left→right, then right→left).
        Requires `/api/motor/calibrate-home` to have been run first.
        Returns immediately — sweep runs in the background.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanCycleRequest"
      responses:
        "200":
          description: Scan session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResponse"
        "409":
          description: Motor not calibrated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResponse"

  /api/motor/enable:
    post:
      tags: [Motor]
      summary: Enable or disable motor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
                  example: true
      responses:
        "200":
          description: Command accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResponse"

components:
  schemas:
    MotorFeedback:
      type: object
      properties:
        minAngle:
          type: number
          format: double
        maxAngle:
          type: number
          format: double
        currentAngle:
          type: number
          format: double
        currentRawSteps:
          type: integer
          format: int64
        angularVelocity:
          type: number
          format: double
        isAtLeftSwitch:
          type: boolean
        isAtRightSwitch:
          type: boolean
        isAtLimitSwitch:
          type: boolean
        isOn:
          type: boolean

    MotorState:
      type: object
      properties:
        state:
          type: string
          enum: [uninitialized, idle, homing, moving]

    HeadPosition:
      type: object
      properties:
        yaw:
          type: number
          format: float
        pitch:
          type: number
          format: float

    SystemStatus:
      type: object
      properties:
        motorState:
          $ref: "#/components/schemas/MotorState"
        motorFeedback:
          $ref: "#/components/schemas/MotorFeedback"
        leftSwitchSteps:
          type: integer
          format: int64
        rightSwitchSteps:
          type: integer
          format: int64

    RawCaptureResponse:
      type: object
      properties:
        timestamp:
          type: string
          description: Folder name / timestamp of the capture (yyyy-MM-dd_HH-mm-ss-SSS)
          example: "2026-07-16_14-32-05-123"
        rightPath:
          type: string
          description: File path of the right camera image
          example: "raw_photo_logs/2026-07-16_14-32-05-123/right.png"
        leftPath:
          type: string
          description: File path of the left camera image
          example: "raw_photo_logs/2026-07-16_14-32-05-123/left.png"

    ScanCycleRequest:
      type: object
      required: [count]
      properties:
        count:
          type: integer
          description: Number of evenly-spaced capture positions across the calibrated range
          example: 10
        cycles:
          type: integer
          description: Number of back-and-forth sweeps to perform
          default: 1
          example: 4
        sweepSpeed:
          type: integer
          description: Motor speed in steps/sec (50–1000)
          default: 200
          minimum: 50
          maximum: 1000
          example: 200
        capturePauseMs:
          type: integer
          format: int64
          description: Milliseconds to pause at the end of each sweep before reversing direction
          default: 500
          example: 500

    CommandResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
